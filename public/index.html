<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>word associator connectiq Audio Call</title>
  </head>
  <body>
    <h1>ConnectIQ</h1>
    <h2 id="status">Connecting...</h2>
    <button id="callBtn" style="display: none">Call</button>
    <button id="hangupBtn" style="display: none">Hang Up</button>

    <audio id="remoteAudio" autoplay></audio>

    <footer
      style="
        position: fixed;
        bottom: 0;
        width: 100%;
        text-align: center;
        padding: 10px;
        font-size: 14px;
        color: #555;
      "
    >
      Made with ❤️ by Mzika
    </footer>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const status = document.getElementById("status");
      const callBtn = document.getElementById("callBtn");
      const hangupBtn = document.getElementById("hangupBtn");
      const remoteAudio = document.getElementById("remoteAudio");

      let peer = null;
      let localStream = null;
      let targetId = null;

      const iceConfig = {
        iceServers: [
          { urls: "stun:stun.l.google.com:19302" },
          {
            urls: "turn:openrelay.metered.ca:80",
            username: "openrelayproject",
            credential: "openrelayproject",
          },
        ],
      };

      function log(msg) {
        status.textContent = msg;
        console.log(msg);
      }

      async function getMic() {
        log("Requesting mic...");
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: false,
        });
        log("Mic granted ✅");
      }

      function createPeer() {
        log("Creating peer connection...");
        peer = new RTCPeerConnection(iceConfig);

        peer.onicecandidate = (e) => {
          if (e.candidate) {
            log("Sending ICE candidate...");
            socket.emit("ice-candidate", {
              target: targetId,
              candidate: e.candidate,
            });
          }
        };

        peer.oniceconnectionstatechange = () => {
          log("ICE state: " + peer.iceConnectionState);
        };

        peer.ontrack = (e) => {
          log("Remote audio received ✅");
          remoteAudio.srcObject = e.streams[0];
        };

        localStream.getTracks().forEach((track) => {
          peer.addTrack(track, localStream);
          log("Local track added: " + track.kind);
        });
      }

      socket.on("wait", () => log("Waiting for someone..."));

      socket.on("start-call", async ({ target }) => {
        targetId = target;
        log("Someone is waiting — press Call");
        callBtn.style.display = "inline";

        callBtn.onclick = async () => {
          callBtn.style.display = "none";
          hangupBtn.style.display = "inline";

          try {
            await getMic();
            createPeer();

            log("Creating offer...");
            const offer = await peer.createOffer();
            await peer.setLocalDescription(offer);
            socket.emit("offer", { target: targetId, offer });
            log("Offer sent ✅");
          } catch (err) {
            log("ERROR: " + err.message);
          }
        };
      });

      socket.on("incoming-call", async ({ from }) => {
        targetId = from;
        log("Incoming call — setting up...");
        hangupBtn.style.display = "inline";

        try {
          await getMic();
          createPeer();
        } catch (err) {
          log("ERROR: " + err.message);
        }
      });

      socket.on("offer", async ({ from, offer }) => {
        targetId = from;
        log("Offer received — sending answer...");
        try {
          await peer.setRemoteDescription(offer);
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          socket.emit("answer", { target: targetId, answer });
          log("Answer sent ✅");
        } catch (err) {
          log("ERROR: " + err.message);
        }
      });

      socket.on("answer", async ({ answer }) => {
        log("Answer received...");
        try {
          await peer.setRemoteDescription(answer);
          log("Connection established ✅");
        } catch (err) {
          log("ERROR: " + err.message);
        }
      });

      socket.on("ice-candidate", async ({ candidate }) => {
        try {
          if (peer) {
            await peer.addIceCandidate(candidate);
            log("ICE candidate added ✅");
          }
        } catch (err) {
          log("ICE ERROR: " + err.message);
        }
      });

      hangupBtn.onclick = () => {
        peer.close();
        peer = null;
        localStream.getTracks().forEach((t) => t.stop());
        log("Call ended.");
        hangupBtn.style.display = "none";
      };
    </script>
  </body>
</html>
