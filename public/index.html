<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ConnectIQ</title>
</head>
<body>
  <h1>ConnectIQ</h1>

  <div id="joinSection">
    <input id="codeInput" type="text" placeholder="Enter room code" />
    <button id="joinBtn">Join</button>
  </div>

  <div id="callSection" style="display:none">
    <p id="status">Connecting...</p>
    <button id="callBtn" style="display:none">Call</button>
    <button id="muteBtn" style="display:none">Mute</button>
    <button id="hangupBtn" style="display:none">Hang Up</button>
  </div>

  <audio id="remoteAudio" autoplay></audio>
  <p><small>Made with ❤️ by Mzika</small></p>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const statusEl = document.getElementById("status");
    const callBtn = document.getElementById("callBtn");
    const hangupBtn = document.getElementById("hangupBtn");
    const muteBtn = document.getElementById("muteBtn");
    const joinBtn = document.getElementById("joinBtn");
    const codeInput = document.getElementById("codeInput");
    const joinSection = document.getElementById("joinSection");
    const callSection = document.getElementById("callSection");
    const remoteAudio = document.getElementById("remoteAudio");

    let peer = null;
    let localStream = null;
    let targetId = null;
    let muted = false;

    const iceConfig = {
      iceServers: [
        { urls: "stun:stun.relay.metered.ca:80" },
        { urls: "turn:global.relay.metered.ca:80", username: "3ed120aad1825faa621ae1b5", credential: "5AkBuqfr/HbEX9cY" },
        { urls: "turn:global.relay.metered.ca:80?transport=tcp", username: "3ed120aad1825faa621ae1b5", credential: "5AkBuqfr/HbEX9cY" },
        { urls: "turn:global.relay.metered.ca:443", username: "3ed120aad1825faa621ae1b5", credential: "5AkBuqfr/HbEX9cY" },
        { urls: "turns:global.relay.metered.ca:443?transport=tcp", username: "3ed120aad1825faa621ae1b5", credential: "5AkBuqfr/HbEX9cY" },
      ],
    };

    function log(msg) {
      statusEl.textContent = msg;
      console.log(msg);
    }

    async function getMic() {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    }

    function createPeer() {
      peer = new RTCPeerConnection(iceConfig);

      peer.onicecandidate = (e) => {
        if (e.candidate) socket.emit("ice-candidate", { target: targetId, candidate: e.candidate });
      };

      peer.oniceconnectionstatechange = () => {
        const state = peer.iceConnectionState;
        if (state === "connected" || state === "completed") {
          log("In call");
          muteBtn.style.display = "inline";
          hangupBtn.style.display = "inline";
        } else if (state === "disconnected" || state === "failed") {
          log("Call ended");
          muteBtn.style.display = "none";
          hangupBtn.style.display = "none";
        }
      };

      peer.ontrack = (e) => {
        remoteAudio.srcObject = e.streams[0];
      };

      localStream.getTracks().forEach(track => peer.addTrack(track, localStream));
    }

    joinBtn.onclick = () => {
      const code = codeInput.value.trim();
      if (!code) return alert("Enter a room code first");
      joinSection.style.display = "none";
      callSection.style.display = "block";
      socket.emit("join-room", code);
    };

    socket.on("wait", () => log("Waiting for your contact..."));

    socket.on("start-call", async ({ target }) => {
      targetId = target;
      log("Contact joined — press Call");
      callBtn.style.display = "inline";

      callBtn.onclick = async () => {
        callBtn.style.display = "none";
        try {
          await getMic();
          createPeer();
          const offer = await peer.createOffer();
          await peer.setLocalDescription(offer);

          const sdp = offer.sdp
            .replace(/a=fmtp:111/g, "a=fmtp:111 maxaveragebitrate=12000;stereo=0;sprop-stereo=0")
            .replace(/a=mid:audio\r\n/g, "a=mid:audio\r\nb=AS:12\r\n");
          offer.sdp = sdp;

          socket.emit("offer", { target: targetId, offer });
          log("Calling...");
        } catch (err) {
          log("Error: " + err.message);
        }
      };
    });

    socket.on("incoming-call", async ({ from }) => {
      targetId = from;
      log("Incoming call...");
      try {
        await getMic();
        createPeer();
      } catch (err) {
        log("Error: " + err.message);
      }
    });

    socket.on("offer", async ({ from, offer }) => {
      targetId = from;
      try {
        await peer.setRemoteDescription(offer);
        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);
        socket.emit("answer", { target: targetId, answer });
      } catch (err) {
        log("Error: " + err.message);
      }
    });

    socket.on("answer", async ({ answer }) => {
      try {
        await peer.setRemoteDescription(answer);
      } catch (err) {
        log("Error: " + err.message);
      }
    });

    socket.on("ice-candidate", async ({ candidate }) => {
      try {
        if (peer) await peer.addIceCandidate(candidate);
      } catch (err) {
        console.error("ICE error:", err);
      }
    });

    muteBtn.onclick = () => {
      muted = !muted;
      localStream.getAudioTracks().forEach(t => t.enabled = !muted);
      muteBtn.textContent = muted ? "Unmute" : "Mute";
    };

    hangupBtn.onclick = () => {
      peer.close();
      peer = null;
      localStream.getTracks().forEach(t => t.stop());
      log("Call ended.");
      muteBtn.style.display = "none";
      hangupBtn.style.display = "none";
    };
  </script>
</body>
</html>
